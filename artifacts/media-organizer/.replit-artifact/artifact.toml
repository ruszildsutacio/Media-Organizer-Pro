kind = "mobile"
previewPath = "/"
title = "Media Organizer"
version = "1.0.0"
id = "artifacts/media-organizer"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 21995

[services.development]
run = "pnpm --filter @workspace/media-organizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/media-organizer", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/media-organizer", "run", "serve" ]

[services.env]
PORT = "21995"
BASE_PATH = "/"
