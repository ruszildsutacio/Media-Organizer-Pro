name: Android CI (EAS Cloud Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup PNPM
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install EAS CLI Globally
      run: pnpm install -g eas-cli

    - name: Install All Monorepo Dependencies
      run: pnpm install

    - name: Build APK on EAS
      run: |
        pnpm --filter @workspace/media-organizer exec eas build --platform android --profile development --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
