name: Android CI (EAS Cloud Build)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    # THIS LINE TELLS GITHUB TO RUN EVERYTHING INSIDE YOUR SUBFOLDER:
    defaults:
      run:
        working-directory: artifacts/media-organizer

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup PNPM
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: Install Expo CLI and EAS CLI
      run: pnpm install -g expo-cli eas-cli
      # We override the directory back to root here just to install global packages safely
      defaults:
        run:
          working-directory: .

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Build APK on EAS
      run: eas build --platform android --profile development --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
